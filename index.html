<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Game - Outono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="hud">
    <div class="hud-content">
      <h1>Pixel Memory Game</h1>
      <div class="user-info">
        <input type="text" id="playerName" placeholder="Seu Nome" maxlength="15">
        <span id="playerRank" style="display: none;">Bronze</span>
      </div>
      <div class="stats">
        <p>Rodada: <span id="round">1</span></p>
        <p>Pontos: <span id="score">0</span></p>
      </div>
      <button id="startBtn">Iniciar Jogo</button>
    </div>
  </div>

  <div id="game-area">
    <div id="pixel-bg-overlay"></div>
    <div id="pixel" class="pixel"></div>
    
    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>🎉 Parabéns!</h2>
        <p id="result-message"></p>
        <div class="result-stats">
          <p>Pontuação: <span id="final-score">0</span></p>
          <p>Rank: <span id="final-rank">Bronze</span></p>
        </div>
        <button id="close-modal">Jogar Novamente</button>
      </div>
    </div>
    
    <div id="intro-screen">
      <div class="campfire-container">
        <div class="flame"></div>
        <div class="logs"></div>
        <div class="logs-extra left"></div>
        <div class="logs-extra right"></div>
        <div class="marshmallow stick-left"></div>
        <div class="marshmallow stick-right"></div>
      </div>
      <p class="intro-text">Aqueça-se na fogueira e prepare-se...</p>
    </div>
  </div>

  <footer id="game-footer">
    <div class="footer-top">
      <div class="proximity-container">
        <span>Proximidade:</span>
        <div class="progress-bar">
          <div id="proximity-fill"></div>
        </div>
        <span id="proximity-value">0%</span>
      </div>
    </div>
    <div class="footer-bottom">
      <p>Desenvolvido por - Anajara M Lucas - 2026</p>
      <a href="https://github.com/Anajaraa" target="_blank" class="github-link">
        <svg height="24" viewBox="0 0 16 16" width="24" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
      </a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
